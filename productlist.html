<!doctype html>
<html lang="da">
  <head>
    <title>Apparel</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <link rel="stylesheet" href="style.css" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Iceberg&display=swap"
      rel="stylesheet"
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne+Mono&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <header>
      <a href="index.html" class="logo">FuckingFashion</a>
    </header>

    <section class="product-list">
      <h1>Apparel</h1>

      <div class="product-grid">
        <!-- Normal produkt -->
        <article class="product-card">
          <a href="product.html">
            <div class="image-wrapper">
              <img
                src="https://kea-alt-del.dk/t7/images/webp/640/1525.webp"
                alt="Taske"
              />
            </div>
            <h2>Sort taske</h2>
            <p class="brand">Nike</p>
            <p class="price">299 kr</p>
          </a>
        </article>

        <!-- Tilbud -->
        <article class="product-card">
          <a href="product.html">
            <div class="image-wrapper">
              <img
                src="https://kea-alt-del.dk/t7/images/webp/640/1532.webp"
                alt="T-shirt"
              />
            </div>

            <h2>Grå T-shirt</h2>
            <p class="brand">Puma</p>

            <div class="discount">
              <p class="price">399 kr</p>
              <span class="offer-label">Tilbud, 200 kr</span>
            </div>
          </a>
        </article>

        <!-- Udsolgt -->
        <article class="product-card">
          <a href="product.html">
            <div class="image-wrapper">
              <span class="sold-label">Udsolgt</span>
              <img
                src="https://kea-alt-del.dk/t7/images/webp/640/1164.webp"
                alt="Sports-trøje"
              />
            </div>
            <h2>Sports trøje</h2>
            <p class="brand">Nike</p>
            <p class="price">199 kr</p>
          </a>
        </article>

        <!-- Både tilbud og udsolgt -->
        <article class="product-card">
          <a href="product.html">
            <div class="image-wrapper">
              <span class="sold-label">Udsolgt</span>
              <img
                src="https://kea-alt-del.dk/t7/images/webp/640/1165.webp"
                alt="Cardigan"
              />
            </div>

            <h2>Sort Cardigan</h2>
            <p class="brand">Adidas</p>

            <div class="discount">
              <p class="price">149 kr</p>
              <span class="offer-label">Tilbud, 100 kr</span>
            </div>
          </a>
        </article>
      </div>
    </section>
  </body>
</html>
